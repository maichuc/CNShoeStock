<body>
    <div class="login-container">
        <!-- Right Side - Welcome Message -->
        <div class="login-right">

        <!-- Left Side - Login Form -->

            <!-- Alert messages -->
            <div id="alert-container"></div>
            
            <form id="loginForm" method="POST" action="auth/xu_ly_dang_nhap.php">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" class="form-control" 
                            id="username" name="username" required
                            placeholder="Tên đăng nhập" value="admin">

                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" class="form-control" 
                            id="password" name="password" required
                            placeholder="Mật khẩu" value="password">
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember_me" name="remember_me">

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Login script -->
    <script>
        $(document).ready(function() {
            // Toggle password visibility
            $('#togglePassword').on('click', function() {
                const passwordField = $('#password');
                const type = passwordField.attr('type') === 'password' ? 'text' : 'password';
                passwordField.attr('type', type);
                
                // Toggle icon
                $(this).toggleClass('fa-eye fa-eye-slash');
            });

            // Login form submission
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                
                const username = $('#username').val().trim();
                const password = $('#password').val();
                const remember_me = $('#remember_me').is(':checked');
                
                if (!username || !password) {
                    showAlert('Vui lòng nhập đầy đủ thông tin!', 'warning');
                    return;
                }
                
                const $btn = $('#loginBtn');
                $btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...');
                
                $.ajax({
                    url: 'api.php', // Thay vì index.php
                    type: 'POST',
                    data: {
                        action: 'login', // Thêm action để Router nhận diện
                        username: username,
                        password: password,
                        remember_me: remember_me ? 1 : 0
                    },
                    dataType: 'json',
                    success: function(response) {
                        console.log('Login Response:', response);
                        
                        if (response.success) {
                            if (response.must_change_password) {
                                showAlert('Đăng nhập thành công! Bạn cần đổi mật khẩu...', 'warning');
                            } else {
                                showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                            }
                            
                            setTimeout(function() {
                                window.location.href = response.redirect || 'index.php';
                            }, 1500);
                        } else {
                            showAlert(response.message || 'Đăng nhập thất bại!', 'danger');
                            $btn.prop('disabled', false).html('<i class="fas fa-sign-in-alt"></i> Đăng nhập');
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('AJAX Error:', xhr.responseText);
                        showAlert('Có lỗi xảy ra. Vui lòng thử lại!', 'danger');
                        $btn.prop('disabled', false).html('<i class="fas fa-sign-in-alt"></i> Đăng nhập');
                    }
                });
            });

            // Social login buttons (demo - add real implementation)
            $('.social-btn').on('click', function() {
                const platform = $(this).attr('title');
                showAlert(`Tính năng đăng nhập bằng ${platform} đang được phát triển`, 'warning');
            });
        });
        
        function showAlert(message, type) {
            const alertHtml = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}"></i>
                    ${message}
                </div>
            `;
            $('#alert-container').html(alertHtml);
            
            // Auto hide after 5 seconds
            setTimeout(function() {
                $('#alert-container').fadeOut(300, function() {
                    $(this).html('').show();
                });
            }, 5000);
        }
    </script>
</body>
